name: TVerデータ収集（BigQuery版：実験用）

on:
  workflow_dispatch: 

jobs:
  test-bq:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: |
          pip install google-cloud-bigquery google-auth selenium webdriver-manager gspread oauth2client

      - name: BigQueryへデータを書き込み
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TVER_DATA_SHEET_ID: ${{ secrets.TVER_DATA_SHEET_ID }}
        run: |
          # 1. いいね数を実行（ファイル名が episode_like_bq.py の場合）
          python episode_like_bq.py
          
          # 2. お気に入り数を実行（ファイル名が program_favorite_bq.py の場合）
          python program_favorite_bq.py
