name: TVerデータ収集（BigQuery版：実験用）

on:
  workflow_dispatch: # GASから動かすための設定

jobs:
  test-bq: # ここが重複していた可能性があります
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v4

      - name: Pythonのセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 必要なライブラリのインストール
        run: |
          pip install google-cloud-bigquery google-auth selenium webdriver-manager gspread oauth2client

      - name: BigQueryへデータを書き込み
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python program_favorite.py
