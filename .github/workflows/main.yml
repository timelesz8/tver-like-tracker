if __name__ == "__main__":
    # 1. 日本時間での現在時刻を取得
    jst = timezone(timedelta(hours=9))
    now = datetime.now(jst).isoformat()
    
    # 2. 取得対象のエピソードIDリスト
    # 本来はここでマスターデータ等からIDを取得するようにします
    target_ids = ["epXXXXXXXX", "epYYYYYYYY"] 

    # 3. ブラウザの起動
    driver = setup_driver()
    results = []
    
    try:
        for eid in target_ids:
            # Seleniumでいいね数を取得
            count = get_tver_like_selenium(driver, eid)
            if count is not None:
                results.append({
                    "episode_id": eid,
                    "like_count": int(count),
                    "observed_at": now
                })
            time.sleep(2) # 負荷軽減
    finally:
        driver.quit() # ブラウザを確実に閉じる

    # 4. BigQueryへデータを一括ロード
    if results:
        upload_to_bigquery(results)
