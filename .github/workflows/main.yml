name: TVerデータ収集実行

on:
  push:
    branches:
      - main
  schedule:
    # 日本時間の毎時00分に実行 (UTCの 15:00 = JSTの 00:00 なので、0 * * * *)
    - cron: "0 * * * *"
  workflow_dispatch: # 手動実行もできるように残します

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
      
      - name: Install dependencies
        run: |
          pip install gspread oauth2client selenium webdriver-manager

      - name: Run favorite script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TVER_DATA_SHEET_ID: ${{ secrets.TVER_DATA_SHEET_ID }}
        run: python program_favorite.py

      - name: Run original script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TVER_DATA_SHEET_ID: ${{ secrets.TVER_DATA_SHEET_ID }}
        run: python episode_like.py
