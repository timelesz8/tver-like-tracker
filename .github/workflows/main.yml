name: TVerデータ収集（お気に入り＆いいね）

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # 1時間に1回自動実行

jobs:
  run-all-scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery selenium requests

      - name: お気に入り数を取得して書き込む
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python program_favorite.py

      - name: いいね数を取得して書き込む
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python episode_like.py
