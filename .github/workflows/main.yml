name: TVerデータ収集（番組お気に入り＆エピソードいいね）実行

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # 1時間に1回実行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v5
        with:
          python-version: '3.10'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery selenium requests

      - name: Run Program Favorite Tracker
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python program_favorite.py

      - name: Run Episode Like Tracker
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python episode_like.py
