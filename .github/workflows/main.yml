name: TVerデータ収集（番組お気に入り＆エピソードいいね）実行

on:
  # 1. GASなど外部APIからのキックを受け付ける設定
  workflow_dispatch:
  repository_dispatch:
    types: [gas_trigger]

  # 2. GitHub側でのスケジュール（念のための予備として残していますが、GASがあれば不要でもあります）
  schedule:
    - cron: "0 * * * *" # 毎時0分（目安）

  # 3. コードを更新した時に自動テスト実行
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # 環境変数の設定（Secretsから読み込み）
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      TVER_DATA_SHEET_ID: ${{ secrets.TVER_DATA_SHEET_ID }}
      GAS_WEB_APP_URL: ${{ secrets.GAS_WEBAPP_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 最新のv5に更新
        with:
          python-version: '3.10'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client selenium==4.18.1 requests google-cloud-bigquery
          
      - name: Run Program Favorite Tracker
        run: python program_favorite.py

      - name: Run Episode Like Tracker
        run: python episode_like.py

      - name: Notify GAS
        # スクリプト終了をGASに通知する場合（URLが設定されている時のみ実行）
        if: env.GAS_WEB_APP_URL != ''
        run: |
          curl -L "${GAS_WEB_APP_URL}"
