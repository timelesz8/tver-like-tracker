name: TVerデータ収集実行

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # これで「毎時0分」に実行されます
  push:
    branches: [ main ]

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      # ブラウザ(Chrome)を動かす設定
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
      - name: Install dependencies
        run: |
          pip install gspread google-auth selenium webdriver-manager
      - name: Run script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TVER_DATA_SHEET_ID: ${{ secrets.TVER_DATA_SHEET_ID }}
        run: python update_script.py
