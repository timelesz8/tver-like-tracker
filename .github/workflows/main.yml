name: TVerデータ収集実行

on:
  push:
    branches:
      - main
  schedule:
    # 毎時05分と25分に実行（2回のチャンス）
    - cron: "5 * * * *"
    - cron: "25 * * * *"
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install gspread oauth2client selenium==4.18.1
      - name: Run original script
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TVER_DATA_SHEET_ID: ${{ secrets.TVER_DATA_SHEET_ID }}
        run: python episode_like.py
