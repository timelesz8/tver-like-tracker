name: TVerデータ収集（お気に入り＆いいね）実行

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # 1時間に1回実行

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager google-api-python-client google-auth-httplib2 google-auth-oauthlib google-cloud-bigquery

      - name: 番組お気に入り数を取得
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python program_favorite.py

      - name: エピソードいいね数を取得
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python episode_like.py
